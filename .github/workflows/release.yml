name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  # Testes das funções puras (is_internal, update_endpoint). Roda em todo push/PR
  # e também antes do release (o build de release depende deste job passar).
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
      - name: cargo test
        working-directory: src-tauri
        run: cargo test --lib --verbose

  # Build do instalador Windows (.exe NSIS) + latest.json assinado, publicado
  # como GitHub Release. Só dispara em tag v* e só se os testes passarem.
  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
      - name: Build + publish (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Chave privada do updater (minisign). A chave foi gerada SEM senha,
          # então a senha é string vazia e não precisa ser um secret.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Jarvas v__VERSION__"
          releaseBody: "Instalador Windows (.exe). Se o SmartScreen alertar, use 'Mais informações → Executar assim mesmo' (app ainda sem code signing — fase 2)."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
